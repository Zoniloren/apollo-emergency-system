<script>
let currentFilter = 'all';
let allReports = [];

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFlYYiGm0PRpY3hKn2yUMCRgiYpLZP409JBpl3Ke7QfiUsG7g9jNyQT2TSn0hpQ-Ye/exec";

function loadReports() {
    const container = document.getElementById('reportsContent');
    container.innerHTML = '<div>Cargando reportes...</div>';
    
    fetch(SCRIPT_URL)
        .then(r => r.json())
        .then(data => {
            allReports = data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            updateStats();
            applyFilters();
        })
        .catch(() => {
            container.innerHTML = '<div>Error al cargar reportes</div>';
        });
}

function updateStats() {
    document.getElementById('safeCount').textContent   = allReports.filter(r => r.status === 'safe').length;
    document.getElementById('helpCount').textContent   = allReports.filter(r => r.status === 'help').length;
    document.getElementById('dangerCount').textContent = allReports.filter(r => r.status === 'danger').length;
    document.getElementById('totalCount').textContent  = allReports.length;
}

setInterval(loadReports, 30000);
loadReports();
</script>
