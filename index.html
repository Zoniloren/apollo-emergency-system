<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Emergencia - Sistema de Seguridad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .alert-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .required {
            color: #ef4444;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
            font-family: inherit;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #667eea;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        .status-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .status-btn {
            padding: 15px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 13px;
            font-weight: 600;
        }
        .status-btn:hover {
            border-color: #667eea;
        }
        .status-btn.selected-safe {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }
        .status-btn.selected-help {
            background: #fef3c7;
            border-color: #f59e0b;
            color: #92400e;
        }
        .status-btn.selected-danger {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .status-icon {
            font-size: 30px;
            margin-bottom: 5px;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .success-title {
            font-size: 24px;
            font-weight: bold;
            color: #10b981;
            margin-bottom: 10px;
        }
        .success-text {
            color: #666;
        }
        .error-msg {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="alert-icon">🚨</div>
            <h1>Reporte de Emergencia</h1>
            <p class="subtitle">Por favor reporta tu estado actual</p>
        </div>

        <form id="emergencyForm">
            <div class="form-group">
                <label>Nombre Completo <span class="required">*</span></label>
                <input type="text" id="name" placeholder="Tu nombre completo" required>
            </div>

            <div class="form-group">
                <label>Email Corporativo <span class="required">*</span></label>
                <input type="email" id="email" placeholder="tu.email@empresa.com" required>
            </div>

            <div class="form-group">
                <label>Departamento <span class="required">*</span></label>
                <select id="department" required>
                    <option value="">Selecciona tu departamento</option>
                    <option value="HVO">HVO</option>
                    <option value="Support">Support</option>
                    <option value="CA">CA</option>
                    <option value="Sales">Sales</option>
                    <option value="HR">HR</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Estado Actual <span class="required">*</span></label>
                <div class="status-options">
                    <button type="button" class="status-btn" data-status="safe" onclick="selectStatus('safe', this)">
                        <div class="status-icon">✅</div>
                        A Salvo
                    </button>
                    <button type="button" class="status-btn" data-status="help" onclick="selectStatus('help', this)">
                        <div class="status-icon">⚠️</div>
                        Necesito Ayuda
                    </button>
                    <button type="button" class="status-btn" data-status="danger" onclick="selectStatus('danger', this)">
                        <div class="status-icon">🆘</div>
                        Emergencia
                    </button>
                </div>
                <div class="error-msg" id="statusError">Por favor selecciona tu estado actual</div>
            </div>

            <div class="form-group">
                <label>Ubicación Actual <span class="required">*</span></label>
                <select id="location" required>
                    <option value="">Selecciona tu ubicación</option>
                    <option value="Ciudad de México">Ciudad de México</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Número de Contacto</label>
                <input type="tel" id="phone" placeholder="Tu número de teléfono">
            </div>

            <div class="form-group">
                <label>Comentarios Adicionales</label>
                <textarea id="comments" placeholder="Información adicional que consideres importante..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Enviar Reporte</button>
        </form>

        <div class="success-message" id="successMessage">
            <div class="success-icon">✅</div>
            <div class="success-title">Reporte Enviado</div>
            <p class="success-text">Tu reporte ha sido registrado exitosamente. Gracias por mantenernos informados.</p>
        </div>
    </div>

    <script>
        let selectedStatus = '';

        function selectStatus(status, btn) {
            document.querySelectorAll('.status-btn').forEach(b => {
                b.className = 'status-btn';
            });
            btn.classList.add('selected-' + status);
            selectedStatus = status;
            document.getElementById('statusError').style.display = 'none';
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbxFlYYiGm0PRpY3hKn2yUMCRgiYpLZP409JBpl3Ke7QfiUsG7g9jNyQT2TSn0hpQ-Ye/exec";

        document.getElementById('emergencyForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!selectedStatus) {
                document.getElementById('statusError').style.display = 'block';
                return;
            }

            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.textContent = 'Enviando...';
            submitBtn.disabled = true;

            const report = {
                reportId: 'RPT-' + Date.now(),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                department: document.getElementById('department').value,
                status: selectedStatus,
                location: document.getElementById('location').value,
                phone: document.getElementById('phone').value,
                comments: document.getElementById('comments').value,
                timestamp: new Date().toISOString()
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(report)
            })
            .then(() => {
                document.getElementById('emergencyForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
            })
            .catch(() => {
                submitBtn.textContent = 'Enviar Reporte';
                submitBtn.disabled = false;
                alert('Error al enviar. Por favor intenta de nuevo.');
            });
        });
    </script>
</body>
</html>
